services:
  - type: web
    name: fraudshield
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: "bash build.sh"
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT --app-dir backend
    plan: free
    envVars:
      - key: DB_MODE
        value: sqlite
      - key: SESSION_SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://fraudshield-ui.onrender.com
      - key: KMP_DUPLICATE_LIB_OK
        value: "TRUE"
      - key: FLAML_TIME_BUDGET
        value: "300"
      - key: PYTHONPATH
        value: /opt/render/project/src/backend
    disk:
      name: fraudshield-data
      mountPath: /data
      sizeGB: 2

  - type: web
    name: fraudshield-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build -- --configuration production
    staticPublishPath: dist/fraud-detection/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
